version: "3.8"

services:
  stadiumiq:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-stadiumiq-prod-key-change-me}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_MODEL=${GOOGLE_MODEL:-gemini-2.5-flash}
    env_file:
      - .env
    restart: unless-stopped
